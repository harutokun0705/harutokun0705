name: Generate Snake

on:
  # 毎日 自動更新
  schedule:
    - cron: "0 0 * * *"
  # 手動実行
  workflow_dispatch:
  # main への push 時
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?palette=github-light&color_snake=7000ff
            dist/snake-dark.svg?palette=github-dark&color_snake=00f0ff&color_dots=#0d0221,#3a0d6b,#7000ff,#b14dff,#00f0ff

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
