name: Update Language Stats

on:
  schedule:
    - cron: "0 15 * * *"   # 毎日 15:00 UTC (= JST 0:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Aggregate languages (incl. pixi org private)
        env:
          # 組織 private を読むための PAT。Settings > Secrets に STATS_TOKEN を登録。
          GH_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: python3 scripts/update_lang_stats.py

      - name: Commit & push if changed
        run: |
          if ! git diff --quiet README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: 言語比率を自動更新 (incl. pixi)"
            git push
          else
            echo "no change"
          fi
